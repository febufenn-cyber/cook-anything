name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Assert no generated build outputs are committed
        run: |
          if git ls-files | grep -qE '^(public/(companion-recipes/|trust-manifest\.json|search-index\.json|recipes-index\.json)|out/|\.wrangler)'; then
            echo "Generated build outputs are committed — remove them; npm run build regenerates them."
            git ls-files | grep -E '^(public/(companion-recipes/|trust-manifest\.json|search-index\.json|recipes-index\.json)|out/|\.wrangler)' | head
            exit 1
          fi

      - name: Companion security tests
        run: |
          set -o pipefail
          npm run test:companion 2>&1 | tee companion-test.log

      - name: Phase 2 trust tests
        run: |
          set -o pipefail
          npm run test:trust 2>&1 | tee trust-test.log

      - name: Phase 3 product-loop tests
        run: |
          set -o pipefail
          npm run test:product 2>&1 | tee product-test.log

      - name: Phase 4 local-kitchen tests
        run: |
          set -o pipefail
          npm run test:kitchen 2>&1 | tee kitchen-test.log

      - name: Phase 5 portable-kitchen sync tests
        run: |
          set -o pipefail
          npm run test:sync 2>&1 | tee sync-test.log

      - name: Phase 6 living-cookbook tests
        run: |
          set -o pipefail
          npm run test:contributions 2>&1 | tee contribution-test.log

      - name: Phase 6.5 account-deletion worker tests
        run: |
          set -o pipefail
          node scripts/test-account-deletion-worker.mjs 2>&1 | tee deletion-worker-tests.log

      - name: Phase 6.6 evidence + config checks
        run: |
          set -o pipefail
          node scripts/check-phase66-evidence.mjs 2>&1 | tee phase66-evidence.log
          node --check scripts/qa-browser-matrix.mjs
          node --check scripts/test-publication-operator-resumption.mjs
          npx tsc --noEmit

      - name: Mandatory recipe trust gate
        run: |
          set -o pipefail
          npm run trust:gate 2>&1 | tee trust-gate.log

      - name: Preserve verification output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verification-output
          path: |
            companion-test.log
            trust-test.log
            product-test.log
            kitchen-test.log
            sync-test.log
            contribution-test.log
            trust-gate.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Validate bridge, service worker and SQL migration files
        run: |
          node --check bridge/server.mjs
          node --check public/sw.js
          test -s supabase/migrations/20260712000100_phase5_portable_kitchen.sql
          test -s supabase/migrations/20260712000200_phase5_sync_push_hardening.sql
          test -s supabase/migrations/20260712000300_phase5_migration_device_registration.sql
          test -s supabase/migrations/20260712000400_phase6_living_cookbook.sql
          test -s supabase/migrations/20260712000500_phase6_account_deletion_hardening.sql
          test -s supabase/migrations/20260712000600_phase65_service_role_guard_fix.sql
          test -s supabase/migrations/20260712000700_phase65_publication_claim_hardening.sql
          test -s supabase/migrations/20260712000800_phase67_revoke_browser_execute_on_trusted_fns.sql
          test -s supabase/migrations/20260712000900_phase67_pgcrypto_search_path.sql
          test -s supabase/migrations/20260712001000_phase67_sync_push_ambiguity_fix.sql
          node --check scripts/test-publication-claiming.mjs
          bash -n bridge/companion-tunnel.sh
          bash -n bridge/companion-watchdog.sh
          bash -n bridge/phase0-disable.sh

      - name: Build static site and trusted manifests
        run: |
          set -o pipefail
          npm run build 2>&1 | tee production-build.log

      - name: Preserve production build output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-build-output
          path: production-build.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Bundle Worker without deploying
        run: |
          set -o pipefail
          npx --yes wrangler@latest deploy --dry-run --outdir .wrangler-dry-run 2>&1 | tee wrangler-dry-run.log

      - name: Preserve Wrangler dry-run output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wrangler-dry-run-output
          path: wrangler-dry-run.log
          if-no-files-found: ignore
          retention-days: 3
